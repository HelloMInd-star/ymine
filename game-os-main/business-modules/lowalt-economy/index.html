<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛩️ AirMind · 低空全域人机神经协同调度引擎 V2.0</title>
    <meta http-equiv="refresh" content="0; url=../../../airmind/index.html">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0b0b1a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .redirect-card {
            background: radial-gradient(ellipse at 30% 30%, #0b1a24, #0b0b1a 70%, #03050a);
            border-radius: 24px;
            padding: 48px 56px;
            border: 1px solid rgba(34, 211, 238, 0.15);
            box-shadow: 0 30px 80px rgba(10, 60, 80, 0.3);
            text-align: center;
            max-width: 560px;
        }
        .badge {
            display: inline-block;
            background: rgba(34,211,238,0.1);
            border: 1px solid rgba(34,211,238,0.3);
            color: #22d3ee;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 18px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            font-family: monospace;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f1f5f9, #22d3ee, #60a5fa);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .desc {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 24px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(34,211,238,0.15);
            border-top-color: #22d3ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .countdown {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            font-family: monospace;
        }
        a.manual-link {
            display: inline-block;
            margin-top: 20px;
            color: #22d3ee;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 28px;
            border: 1px solid rgba(34,211,238,0.3);
            border-radius: 10px;
            transition: all 0.3s;
        }
        a.manual-link:hover {
            background: rgba(34,211,238,0.1);
            border-color: #22d3ee;
            box-shadow: 0 8px 25px rgba(34,211,238,0.15);
        }
        .meta {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            font-family: monospace;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <div class="badge">🔄 页面迁移</div>
        <h1>🛩️ AirMind · 低空全域人机神经协同调度引擎 V2.0</h1>
        <div class="desc">
            低空经济模块已升级为独立 AirMind V2.0 引擎<br>
            新增：双层阻尼张量 · 串级PID控制 · 三维空地对照 · 地应力矩阵 · 对流算法
        </div>
        <div class="spinner"></div>
        <div class="countdown" id="countdown">正在跳转到 airmind/index.html ... 0秒</div>
        <a href="../../../airmind/index.html" class="manual-link">→ 立即跳转 AirMind V2.0</a>
        <div class="meta">
            Y.Mine · AirMind V2.0 · Game-OS V2.1<br>
            GameMind 子引擎 · 低空全域人机神经协同调度
        </div>
    </div>

    <script>
        var seconds = 0;
        var cd = document.getElementById('countdown');
        function updateCountdown() {
            cd.textContent = '正在跳转到 airmind/index.html ... ' + seconds + '秒';
            seconds++;
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);
        setTimeout(function() {
            window.location.href = '../../../airmind/index.html';
        }, 100);
    </script>
</body>
</html>
