<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y.Mine · 价值金字塔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: 0.5px;
        }

        .sub {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
            margin-bottom: 32px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
            width: 100%;
            text-align: center;
        }

        .tier {
            width: 100%;
            padding: 20px 28px;
            margin-bottom: 12px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .tier:hover {
            transform: translateY(-2px);
        }

        .tier .label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .tier .name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tier .desc {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .tier .evi {
            font-size: 13px;
            font-weight: 400;
            opacity: 0.7;
            border-top: 1px dashed rgba(255, 255, 255, 0.25);
            padding-top: 10px;
            margin-top: 6px;
        }

        /* 三层配色 */
        .top {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            color: #f1f5f9;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.20);
        }

        .mid {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
            width: 88%;
        }

        .base {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
            color: #fff;
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.25);
            width: 76%;
        }

        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: #94a3b8;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            width: 100%;
        }

        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .tier {
                padding: 16px 18px;
            }
            .tier .name {
                font-size: 18px;
            }
            .tier .desc {
                font-size: 13px;
            }
            h1 {
                font-size: 22px;
            }
            .mid,
            .base {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Y.Mine · 价值金字塔</h1>
        <div class="sub">三层递进 · 从单点能力到系统架构</div>

        <!-- 顶层：战略 -->
        <div class="tier top">
            <div class="label">战略级</div>
            <div class="name">能帮公司搭建系统</div>
            <div class="desc">完整体系已可迁移复用</div>
            <div class="evi">📁 知识资产全景图</div>
        </div>

        <!-- 中层：战役 -->
        <div class="tier mid">
            <div class="label">战役级</div>
            <div class="name">能独立攻克陌生领域</div>
            <div class="desc">跨领域方法已验证成立</div>
            <div class="evi">⚡ 6小时吞噬6个陌生领域</div>
        </div>

        <!-- 底层：战术 -->
        <div class="tier base">
            <div class="label">战术级</div>
            <div class="name">能深度拆解一个领域</div>
            <div class="desc">单一领域已穿透至底层</div>
            <div class="evi">🔍 元架构重构营销学</div>
        </div>

        <div class="footer">
           <a href="index.html">← 返回 Y.Mine 作品集首页</a> 
        </div>

    </div>

</body>
</html>
