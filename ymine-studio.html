<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Y.Mine · 机构级量化投研十步闭环引擎</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <script src="assets/js/bus.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <script src="assets/js/cone-game-theory.js"></script>
    <script src="assets/js/valuation-engine.js"></script>
    <script src="assets/js/risk-circuit-breaker.js"></script>
    <script src="assets/js/mcn-alpha-engine.js"></script>
    <script src="assets/js/quant-engine.js"></script>
    <style>
        body { background: #060612; }
        .main-content { padding: 0; max-width: none; width: calc(100vw - 260px - 30px); margin: 0 15px; }

        .studio-container {
            width: 100%; max-width: 1500px; margin: 0 auto;
            background: radial-gradient(ellipse at 25% 0%, #120a25, #060612 55%, #020108);
            border-radius: 24px; padding: 24px 28px;
            border: 1px solid rgba(167,139,250,0.10);
            box-shadow: 0 20px 70px rgba(30,5,60,0.6);
            position: relative; overflow: hidden; z-index: 1;
        }
        .studio-header { text-align: center; margin-bottom: 16px; position: relative; z-index: 2; }
        .studio-header .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(234,179,8,0.15), rgba(249,115,22,0.1));
            border: 1px solid rgba(234,179,8,0.25);
            color: #facc15; font-size: 10px; padding: 3px 12px; border-radius: 20px;
            letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px;
        }
        .studio-header h1 {
            font-size: 26px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.4px;
            background: linear-gradient(135deg, #f1f5f9 0%, #facc15 40%, #a78bfa 70%, #60a5fa 100%);
            background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientFlow 5s ease-in-out infinite; margin-bottom: 3px;
        }
        .studio-header .sub { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 300; }

        .control-bar {
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            background: rgba(167,139,250,0.05); border: 1px solid rgba(167,139,250,0.10);
            border-radius: 12px; padding: 12px 18px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .regime-toggle { display: flex; gap: 6px; }
        .regime-btn {
            padding: 7px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5); cursor: pointer;
            font-size: 12px; font-weight: 600; transition: all 0.2s;
        }
        .regime-btn.active-red {
            background: linear-gradient(135deg, rgba(239,68,68,0.2), rgba(239,68,68,0.08));
            border-color: rgba(239,68,68,0.4); color: #fca5a5; box-shadow: 0 0 15px rgba(239,68,68,0.15);
        }
        .regime-btn.active-blue {
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.08));
            border-color: rgba(59,130,246,0.4); color: #93c5fd; box-shadow: 0 0 15px rgba(59,130,246,0.15);
        }
        .run-btn {
            padding: 9px 28px; border-radius: 10px; border: none; cursor: pointer;
            background: linear-gradient(135deg, #facc15, #f97316); color: #000; font-weight: 700;
            font-size: 13px; letter-spacing: 0.5px; transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(250,204,21,0.25);
        }
        .run-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(250,204,21,0.4); }
        .run-btn:disabled { opacity: 0.5; cursor: wait; }
        .halt-btn {
            padding: 9px 20px; border-radius: 10px; border: 1px solid rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.1); color: #fca5a5; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .halt-btn:hover { background: rgba(239,68,68,0.2); }
        .asset-select {
            padding: 7px 12px; border-radius: 8px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; font-size: 12px;
        }
        .asset-select option { background: #0f0f1e; }

        .health-bar {
            display: flex; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.5);
            align-items: center;
        }
        .health-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        .pipeline-grid {
            display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px;
            margin-bottom: 16px; position: relative; z-index: 2;
        }
        .pipeline-step {
            background: rgba(15,15,35,0.8); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 10px 8px; text-align: center;
            transition: all 0.3s; position: relative; cursor: default;
        }
        .pipeline-step::after {
            content: '→'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.1); font-size: 14px; font-weight: 300; z-index: 3;
        }
        .pipeline-step:last-child::after { display: none; }
        .pipeline-step .step-icon { font-size: 20px; margin-bottom: 3px; }
        .pipeline-step .step-num { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 600; letter-spacing: 0.5px; }
        .pipeline-step .step-name { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; line-height: 1.2; }
        .pipeline-step.pending { opacity: 0.4; }
        .pipeline-step.active {
            background: linear-gradient(135deg, rgba(250,204,21,0.15), rgba(249,115,22,0.08));
            border-color: rgba(250,204,21,0.4); box-shadow: 0 0 20px rgba(250,204,21,0.1);
        }
        .pipeline-step.active .step-name { color: #facc15; font-weight: 600; }
        .pipeline-step.completed {
            background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.04));
            border-color: rgba(34,197,94,0.3);
        }
        .pipeline-step.completed .step-name { color: #86efac; }
        .pipeline-step.halted {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05));
            border-color: rgba(239,68,68,0.5); animation: pulseRed 1s ease-in-out infinite;
        }
        .pipeline-step.halted .step-name { color: #fca5a5; }

        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 10px rgba(239,68,68,0.2); }
            50% { box-shadow: 0 0 25px rgba(239,68,68,0.5); }
        }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative; z-index: 2; }
        .card {
            background: rgba(12,10,25,0.7); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 14px 16px;
        }
        .card-wide { grid-column: 1 / -1; }
        .card-title {
            font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
            letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .card-title .dot { width: 6px; height: 6px; border-radius: 50%; }

        .kv-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 12px; font-size: 12px; }
        .kv-key { color: rgba(255,255,255,0.4); }
        .kv-val { color: #e2e8f0; font-weight: 500; font-variant-numeric: tabular-nums; }
        .kv-val.good { color: #86efac; }
        .kv-val.warn { color: #facc15; }
        .kv-val.bad { color: #fca5a5; }

        .asset-pool { display: flex; flex-wrap: wrap; gap: 6px; }
        .asset-chip {
            padding: 4px 10px; border-radius: 6px; font-size: 11px;
            background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.15);
            color: #c4b5fd; cursor: pointer; transition: all 0.15s;
        }
        .asset-chip:hover { background: rgba(167,139,250,0.18); }
        .asset-chip.selected {
            background: linear-gradient(135deg, rgba(250,204,21,0.2), rgba(249,115,22,0.1));
            border-color: rgba(250,204,21,0.4); color: #facc15;
        }

        .factor-bars { display: flex; flex-direction: column; gap: 7px; }
        .factor-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .factor-label { width: 50px; color: rgba(255,255,255,0.4); }
        .factor-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
        .factor-bar { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .factor-val { width: 40px; text-align: right; color: #e2e8f0; font-variant-numeric: tabular-nums; }

        .price-target {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            margin-top: 8px; padding: 8px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.02);
        }
        .price-col { text-align: center; }
        .price-label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; }
        .price-val { font-size: 16px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
        .price-arrow { font-size: 16px; color: rgba(255,255,255,0.15); }

        .kline-canvas-wrap { width: 100%; height: 140px; background: rgba(0,0,0,0.3); border-radius: 8px; position: relative; overflow: hidden; }
        canvas { display: block; }

        .stress-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .stress-item {
            padding: 7px 10px; border-radius: 7px; font-size: 11px;
            background: rgba(255,255,255,0.02); border-left: 3px solid;
        }
        .stress-item .stress-name { color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 2px; }
        .stress-item .stress-pnl { font-variant-numeric: tabular-nums; font-weight: 700; }

        .rationality-gauge { display: flex; align-items: center; gap: 16px; }
        .gauge-circle {
            width: 80px; height: 80px; border-radius: 50%; position: relative;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .gauge-circle svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
        .gauge-score { font-size: 24px; font-weight: 800; z-index: 1; font-variant-numeric: tabular-nums; }
        .gauge-label { font-size: 10px; color: rgba(255,255,255,0.3); text-align: center; }
        .bias-list { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .bias-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .bias-name { width: 70px; color: rgba(255,255,255,0.4); }
        .bias-bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
        .bias-bar { height: 100%; border-radius: 3px; }

        .execution-panel {
            background: linear-gradient(135deg, rgba(34,197,94,0.08), rgba(16,185,129,0.03));
            border: 2px solid rgba(34,197,94,0.25); border-radius: 14px; padding: 18px 22px;
            position: relative; overflow: hidden;
        }
        .execution-panel.halted {
            background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(239,68,68,0.03));
            border-color: rgba(239,68,68,0.4);
        }
        .exec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .exec-signal { font-size: 28px; font-weight: 900; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
        .exec-signal.buy { color: #22c55e; text-shadow: 0 0 20px rgba(34,197,94,0.3); }
        .exec-signal.sell { color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,0.3); }
        .exec-signal.hold { color: #facc15; text-shadow: 0 0 20px rgba(250,204,21,0.3); }
        .exec-pos { text-align: right; }
        .exec-pos-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
        .exec-pos-val { font-size: 32px; font-weight: 900; color: #f1f5f9; font-variant-numeric: tabular-nums; }
        .exec-pos-val.halted { color: #ef4444; }
        .exec-meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
        .exec-meta-item { text-align: center; }
        .exec-meta-label { font-size: 9px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; }
        .exec-meta-val { font-size: 14px; font-weight: 700; color: #e2e8f0; margin-top: 2px; font-variant-numeric: tabular-nums; }

        .warnings-box { margin-top: 10px; }
        .warning-item {
            padding: 6px 12px; border-radius: 6px; font-size: 11px; margin-bottom: 4px;
            background: rgba(250,204,21,0.08); border-left: 3px solid #facc15; color: #fde68a;
        }
        .warning-item.danger { background: rgba(239,68,68,0.08); border-left-color: #ef4444; color: #fca5a5; }

        .hedge-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .hedge-chip {
            padding: 4px 10px; border-radius: 6px; font-size: 10px;
            background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
            color: #93c5fd;
        }

        .audit-trail {
            display: flex; gap: 4px; align-items: center; flex-wrap: wrap; font-size: 10px;
            color: rgba(255,255,255,0.3); margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .audit-step { padding: 2px 8px; border-radius: 4px; background: rgba(34,197,94,0.1); color: #86efac; }

        .placeholder {
            padding: 30px; text-align: center; color: rgba(255,255,255,0.2); font-size: 13px;
        }
        .placeholder .big-icon { font-size: 40px; margin-bottom: 8px; opacity: 0.3; }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
    </style>
</head>
<body class="layout-fixed">
    <div class="main-content">
        <div class="studio-container">
            <div class="studio-header">
                <div class="badge">v2.0 · Institutional Quant Engine</div>
                <h1>机构级量化投研 · 十步闭环引擎</h1>
                <div class="sub">宏观海选 → 因子提取 → 核心定价 → 沙盘推演 → 人性测试 → 熔断门控 → 最终执行</div>
            </div>

            <div class="control-bar">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="regime-toggle">
                        <button class="regime-btn active-red" id="btnRedOcean" onclick="switchRegimeUI('RED_OCEAN')">🔴 红海 · 存量博弈</button>
                        <button class="regime-btn" id="btnBlueOcean" onclick="switchRegimeUI('BLUE_OCEAN')">🔵 蓝海 · 增量资金</button>
                    </div>
                    <select class="asset-select" id="assetSelect">
                        <option value="">自动海选</option>
                    </select>
                </div>
                <div style="display:flex; gap:8px; align-items:center;">
                    <div class="health-bar">
                        <div class="health-dot" id="healthDot"></div>
                        <span id="healthText">系统就绪</span>
                    </div>
                    <button class="run-btn" id="runBtn" onclick="runFullPipeline()">🚀 启动十步闭环</button>
                    <button class="halt-btn" onclick="emergencyHaltUI()">🛑 紧急停机</button>
                </div>
            </div>

            <div class="pipeline-grid" id="pipelineGrid"></div>

            <div class="content-grid" id="contentArea">
                <div class="card card-wide">
                    <div class="placeholder">
                        <div class="big-icon">🏛️</div>
                        <div>选择宏观环境，点击「启动十步闭环」开始完整投研流程</div>
                        <div style="font-size:11px; margin-top:6px; opacity:0.6;">所有计算在浏览器本地完成，数据永不上传</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
(function() {
    const STEPS = [
        { id: 0, icon: '🌊', name: '宏观海选' },
        { id: 1, icon: '📥', name: '信息摄入' },
        { id: 2, icon: '⚗️', name: '数据ETL' },
        { id: 3, icon: '⚖️', name: '核心定价' },
        { id: 4, icon: '📐', name: '估值计算' },
        { id: 5, icon: '🔮', name: '决策推演' },
        { id: 6, icon: '📈', name: '动态K线' },
        { id: 7, icon: '🃏', name: '人性测试' },
        { id: 8, icon: '🛡️', name: '对冲配置' }
    ];

    let currentRegime = 'RED_OCEAN';
    let pipelineRunning = false;
    let results = {};
    let klineCanvas = null;

    function $(id) { return document.getElementById(id); }

    function initPipelineGrid() {
        const grid = $('pipelineGrid');
        grid.innerHTML = '';
        STEPS.forEach(function(step) {
            const el = document.createElement('div');
            el.className = 'pipeline-step pending';
            el.id = 'step-' + step.id;
            el.innerHTML = '<div class="step-icon">' + step.icon + '</div>' +
                           '<div class="step-num">STEP ' + step.id + '</div>' +
                           '<div class="step-name">' + step.name + '</div>';
            grid.appendChild(el);
        });
    }

    function initAssetSelect() {
        const sel = $('assetSelect');
        if (typeof YMineQuantEngine !== 'undefined' && YMineQuantEngine.PRESET_ASSETS) {
            YMineQuantEngine.PRESET_ASSETS.forEach(function(a) {
                const opt = document.createElement('option');
                opt.value = a.ticker;
                opt.textContent = a.ticker + ' · ' + a.name;
                sel.appendChild(opt);
            });
        }
    }

    function setStepStatus(stepId, status) {
        const el = $('step-' + stepId);
        if (!el) return;
        el.className = 'pipeline-step ' + status;
    }

    function switchRegimeUI(regime) {
        currentRegime = regime;
        $('btnRedOcean').className = 'regime-btn' + (regime === 'RED_OCEAN' ? ' active-red' : '');
        $('btnBlueOcean').className = 'regime-btn' + (regime === 'BLUE_OCEAN' ? ' active-blue' : '');
        if (typeof YMineQuantEngine !== 'undefined') {
            YMineQuantEngine.switchRegime(regime, 'ui_switch');
        }
    }

    function emergencyHaltUI() {
        if (typeof YMineQuantEngine !== 'undefined') {
            YMineQuantEngine.emergencyHalt('用户手动紧急停机');
        }
        setHealth('halted', '🚨 紧急停机');
        STEPS.forEach(function(s) { setStepStatus(s.id, 'halted'); });
        $('healthDot').style.background = '#ef4444';
        $('healthDot').style.boxShadow = '0 0 10px #ef4444';
    }

    function setHealth(status, text) {
        const dot = $('healthDot');
        const txt = $('healthText');
        txt.textContent = text;
        if (status === 'ok') { dot.style.background = '#22c55e'; dot.style.boxShadow = '0 0 8px #22c55e'; }
        else if (status === 'running') { dot.style.background = '#facc15'; dot.style.boxShadow = '0 0 8px #facc15'; }
        else if (status === 'warn') { dot.style.background = '#f97316'; dot.style.boxShadow = '0 0 8px #f97316'; }
        else if (status === 'halted') { dot.style.background = '#ef4444'; dot.style.boxShadow = '0 0 10px #ef4444'; }
    }

    function fmtPct(v, d) { d = d || 1; return (v * 100).toFixed(d) + '%'; }
    function fmtNum(v, d) { d = d || 2; return Number(v).toFixed(d); }
    function colorVal(v, goodHigh) {
        if (goodHigh) return v > 0.6 ? 'good' : (v > 0.3 ? 'warn' : 'bad');
        return v < 0.3 ? 'good' : (v < 0.6 ? 'warn' : 'bad');
    }

    function drawKline(klineData) {
        const wrap = document.querySelector('.kline-canvas-wrap');
        if (!wrap || !klineData || klineData.length === 0) return;
        wrap.innerHTML = '<canvas id="klineCanvas"></canvas>';
        const canvas = $('klineCanvas');
        klineCanvas = canvas;
        const w = wrap.clientWidth;
        const h = wrap.clientHeight;
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        const prices = klineData.map(function(k) { return [k.low, k.high]; }).flat();
        const minP = Math.min.apply(null, prices) * 0.98;
        const maxP = Math.max.apply(null, prices) * 1.02;
        const padL = 30, padR = 10, padT = 10, padB = 20;
        const plotW = w - padL - padR, plotH = h - padT - padB;
        const n = klineData.length;
        const cw = plotW / n;
        const cy = padT + plotH;
        const scale = function(p) { return cy - (p - minP) / (maxP - minP) * plotH; };

        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        [0, 0.25, 0.5, 0.75, 1].forEach(function(r) {
            const y = padT + r * plotH;
            ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
        });

        const gravityCenter = klineData[0].gravityCenter;
        const gy = scale(gravityCenter);
        ctx.strokeStyle = 'rgba(167,139,250,0.5)'; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(padL, gy); ctx.lineTo(w - padR, gy); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(167,139,250,0.7)'; ctx.font = '9px sans-serif';
        ctx.fillText('引力 ' + fmtNum(gravityCenter, 1), padL + 2, gy - 4);

        for (let i = 0; i < n; i++) {
            const k = klineData[i];
            const x = padL + i * cw + cw / 2;
            const bh = cw * 0.6;
            const up = k.close >= k.open;
            const color = k.coneC >= 0.68 ? '#ef4444' : (up ? '#22c55e' : '#ef4444');
            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x, scale(k.high)); ctx.lineTo(x, scale(k.low)); ctx.stroke();
            const by1 = scale(k.open), by2 = scale(k.close);
            const bodyTop = Math.min(by1, by2), bodyH = Math.max(1, Math.abs(by1 - by2));
            ctx.fillRect(x - bh/2, bodyTop, bh, bodyH);
        }
        ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '9px sans-serif';
        ctx.fillText(fmtNum(maxP, 0), 2, padT + 8);
        ctx.fillText(fmtNum(minP, 0), 2, h - padB + 4);
    }

    function renderContent() {
        const area = $('contentArea');
        const mf = results.macroFunnel;
        const fl = results.factorLibrary;
        const val = results.valuationV2;
        const sim = results.simulationResult;
        const rat = results.rationalityScore;
        const exec = results.executionOrder;

        if (!mf) {
            area.innerHTML = '<div class="card card-wide"><div class="placeholder"><div class="big-icon">🏛️</div><div>选择宏观环境，点击「启动十步闭环」开始完整投研流程</div></div></div>';
            return;
        }

        let html = '';

        html += '<div class="card"><div class="card-title"><span class="dot" style="background:#60a5fa"></span>🌊 Step 0 · 宏观漏斗与海选</div>';
        html += '<div class="kv-grid" style="margin-bottom:10px;">';
        html += '<div class="kv-key">当前环境</div><div class="kv-val">' + (mf.regime === 'BLUE_OCEAN' ? '🔵 蓝海·增量资金' : '🔴 红海·存量博弈') + '</div>';
        html += '<div class="kv-key">筛选总数</div><div class="kv-val">' + mf.totalScreened + ' → ' + mf.totalPassed + ' 只</div>';
        html += '<div class="kv-key">无风险利率</div><div class="kv-val">' + fmtPct(mf.macroIndicators.riskFreeRate, 1) + '</div>';
        html += '<div class="kv-key">VIX恐慌指数</div><div class="kv-val ' + (mf.macroIndicators.vix > 25 ? 'bad' : 'good') + '">' + fmtNum(mf.macroIndicators.vix, 0) + '</div>';
        html += '<div class="kv-key">市场情绪</div><div class="kv-val">' + fmtNum(mf.macroIndicators.marketSentiment, 0) + '/100</div>';
        html += '</div>';
        html += '<div class="card-title" style="margin-top:8px; font-size:10px;">精选标的池</div>';
        html += '<div class="asset-pool">';
        (mf.assets || []).slice(0, 10).forEach(function(a) {
            const sel = mf.selectedAsset && a.ticker === mf.selectedAsset.ticker ? ' selected' : '';
            html += '<div class="asset-chip' + sel + '">' + a.ticker + ' · ' + a.name + ' <span style="opacity:0.6;font-size:10px;">' + Math.round(a.screeningScore) + '分</span></div>';
        });
        html += '</div></div>';

        if (fl) {
            html += '<div class="card"><div class="card-title"><span class="dot" style="background:#a78bfa"></span>📥⚗️ Step 1-2 · 因子库提取</div>';
            html += '<div class="factor-bars">';
            const factors = [
                { label: '价值', val: fl.factorZScores ? (fl.factorZScores.value || 0.5) : 0.5 },
                { label: '成长', val: fl.factorZScores ? (fl.factorZScores.growth || 0.5) : 0.5 },
                { label: '质量', val: fl.factorZScores ? (fl.factorZScores.quality || 0.5) : 0.5 },
                { label: '动量', val: fl.factorZScores ? (fl.factorZScores.momentum || 0.5) : 0.5 },
                { label: '情绪', val: fl.factorZScores ? (fl.factorZScores.sentiment || 0.5) : 0.5 }
            ];
            factors.forEach(function(f) {
                const pct = Math.round(clamp01(f.val) * 100);
                const color = pct > 60 ? '#22c55e' : (pct > 40 ? '#facc15' : '#ef4444');
                html += '<div class="factor-row"><div class="factor-label">' + f.label + '</div>';
                html += '<div class="factor-bar-bg"><div class="factor-bar" style="width:' + pct + '%;background:' + color + '"></div></div>';
                html += '<div class="factor-val">' + pct + '</div></div>';
            });
            html += '</div>';
            if (fl.riskFactors) {
                html += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);" class="kv-grid">';
                html += '<div class="kv-key">圆锥浓度C</div><div class="kv-val ' + (fl.riskFactors.coneC >= 0.68 ? 'bad' : (fl.riskFactors.coneC >= 0.55 ? 'warn' : 'good')) + '">' + fmtNum(fl.riskFactors.coneC, 3) + '</div>';
                html += '<div class="kv-key">动态β</div><div class="kv-val">' + fmtNum(fl.riskFactors.beta, 2) + '</div>';
                html += '<div class="kv-key">30日波动率</div><div class="kv-val">' + fmtPct(fl.riskFactors.volatility30d) + '</div>';
                html += '</div>';
            }
            html += '</div>';
        } else {
            html += '<div class="card"><div class="card-title"><span class="dot" style="background:#a78bfa"></span>📥⚗️ Step 1-2 · 因子库提取</div><div class="placeholder" style="padding:20px;font-size:11px;">等待执行...</div></div>';
        }

        if (val) {
            html += '<div class="card"><div class="card-title"><span class="dot" style="background:#facc15"></span>⚖️📐 Step 3-4 · 核心定价与估值</div>';
            html += '<div class="kv-grid">';
            html += '<div class="kv-key">当前价格</div><div class="kv-val">' + fmtNum(val.currentPrice, 2) + '</div>';
            html += '<div class="kv-key">WACC</div><div class="kv-val">' + fmtPct(val.wacc.wacc, 2) + '</div>';
            html += '<div class="kv-key">动态β</div><div class="kv-val">' + fmtNum(val.pricing.dynamicBeta, 2) + '</div>';
            html += '<div class="kv-key">估值信号</div><div class="kv-val ' + (val.pricing.valuationSignal === 'BULLISH' ? 'good' : (val.pricing.valuationSignal === 'BEARISH' ? 'bad' : 'warn')) + '">' + val.pricing.valuationSignal + '</div>';
            html += '<div class="kv-key">安全边际</div><div class="kv-val ' + (val.pricing.marginOfSafety > 0.1 ? 'good' : 'bad') + '">' + fmtPct(val.pricing.marginOfSafety) + '</div>';
            if (val.dcf) {
                html += '<div class="kv-key">NPV</div><div class="kv-val ' + (val.dcf.npvNegative ? 'bad' : 'good') + '">' + fmtNum(val.dcf.npv, 0) + '</div>';
            }
            html += '</div>';
            html += '<div class="price-target">';
            html += '<div class="price-col"><div class="price-label">悲观目标</div><div class="price-val" style="color:#ef4444;">' + fmtNum(val.pricing.targetPriceRange.bear, 1) + '</div></div>';
            html += '<div class="price-arrow">←</div>';
            html += '<div class="price-col"><div class="price-label">中性目标</div><div class="price-val" style="color:#facc15;">' + fmtNum(val.pricing.targetPriceRange.base, 1) + '</div></div>';
            html += '<div class="price-arrow">→</div>';
            html += '<div class="price-col"><div class="price-label">乐观目标</div><div class="price-val" style="color:#22c55e;">' + fmtNum(val.pricing.targetPriceRange.bull, 1) + '</div></div>';
            html += '</div></div>';
        } else {
            html += '<div class="card"><div class="card-title"><span class="dot" style="background:#facc15"></span>⚖️📐 Step 3-4 · 核心定价与估值</div><div class="placeholder" style="padding:20px;font-size:11px;">等待执行...</div></div>';
        }

        if (sim) {
            html += '<div class="card card-wide"><div class="card-title"><span class="dot" style="background:#f97316"></span>🔮📈 Step 5-6 · 决策推演与动态K线</div>';
            html += '<div class="kline-canvas-wrap" id="klineWrap"></div>';
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">';
            html += '<div class="kv-grid" style="font-size:11px;">';
            html += '<div class="kv-key">蒙特卡洛路径</div><div class="kv-val">' + sim.monteCarlo.runs + '次</div>';
            html += '<div class="kv-key">熔断触发概率</div><div class="kv-val ' + (sim.monteCarlo.statistics.fuseTriggerProbability > 0.3 ? 'bad' : 'good') + '">' + fmtPct(sim.monteCarlo.statistics.fuseTriggerProbability) + '</div>';
            html += '<div class="kv-key">平均最大回撤</div><div class="kv-val ' + (sim.monteCarlo.statistics.meanMaxDrawdown > 0.3 ? 'bad' : 'good') + '">' + fmtPct(sim.monteCarlo.statistics.meanMaxDrawdown) + '</div>';
            html += '<div class="kv-key">夏普比率</div><div class="kv-val good">' + fmtNum(sim.monteCarlo.statistics.meanSharpeRatio, 2) + '</div>';
            html += '<div class="kv-key">入场区间</div><div class="kv-val">' + fmtNum(sim.sandboxRecommendation.optimalEntryZone.low,1) + ' - ' + fmtNum(sim.sandboxRecommendation.optimalEntryZone.high,1) + '</div>';
            html += '<div class="kv-key">预警等级</div><div class="kv-val ' + (sim.sandboxRecommendation.warningLevel === 'LOW' ? 'good' : (sim.sandboxRecommendation.warningLevel === 'EXTREME' ? 'bad' : 'warn')) + '">' + sim.sandboxRecommendation.warningLevel + '</div>';
            html += '</div>';
            html += '<div class="stress-grid">';
            sim.stressTests.forEach(function(s) {
                const pnlColor = s.pnlPercent < -0.2 ? '#ef4444' : (s.pnlPercent < -0.1 ? '#facc15' : '#22c55e');
                html += '<div class="stress-item" style="border-left-color:' + (s.fuseTriggered ? '#ef4444' : '#facc15') + '">';
                html += '<div class="stress-name">' + s.name + '</div>';
                html += '<div class="stress-pnl" style="color:' + pnlColor + '">' + fmtPct(s.pnlPercent) + '</div>';
                if (s.fuseTriggered) html += '<div style="font-size:9px;color:#fca5a5;margin-top:1px;">⚠ 熔断触发</div>';
                html += '</div>';
            });
            html += '</div></div></div>';
        } else {
            html += '<div class="card card-wide"><div class="card-title"><span class="dot" style="background:#f97316"></span>🔮📈 Step 5-6 · 决策推演与动态K线</div><div class="placeholder" style="padding:20px;font-size:11px;">等待执行...</div></div>';
        }

        if (rat) {
            const scoreColor = rat.overallScore >= 85 ? '#22c55e' : (rat.overallScore >= 60 ? '#facc15' : (rat.overallScore >= 30 ? '#f97316' : '#ef4444'));
            const dashArray = 2 * Math.PI * 34;
            const dashOffset = dashArray * (1 - rat.overallScore / 100);
            html += '<div class="card"><div class="card-title"><span class="dot" style="background:#ec4899"></span>🃏 Step 7 · 人性压力测试</div>';
            html += '<div class="rationality-gauge">';
            html += '<div class="gauge-circle">';
            html += '<svg width="80" height="80"><circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>';
            html += '<circle cx="40" cy="40" r="34" fill="none" stroke="' + scoreColor + '" stroke-width="6" stroke-linecap="round" stroke-dasharray="' + dashArray + '" stroke-dashoffset="' + dashOffset + '"/></svg>';
            html += '<div class="gauge-score" style="color:' + scoreColor + '">' + rat.overallScore + '</div>';
            html += '</div>';
            html += '<div class="bias-list">';
            html += '<div style="font-size:12px;font-weight:700;color:' + scoreColor + ';margin-bottom:3px;">' + stateLabel(rat.rationalityState) + '</div>';
            const biasItems = [
                { name: '过度攻击', val: rat.biases.overAggressionFactor - 1, max: 1 },
                { name: '损失厌恶', val: rat.biases.lossAversionFactor - 1, max: 1 },
                { name: '过度自信', val: rat.biases.overconfidenceFactor - 1, max: 1 },
                { name: '追损倾向', val: rat.biases.chasingFactor - 1, max: 1 }
            ];
            biasItems.forEach(function(b) {
                const p = clamp01(b.val / b.max) * 100;
                const c = p > 50 ? '#ef4444' : (p > 25 ? '#facc15' : '#22c55e');
                html += '<div class="bias-row"><div class="bias-name">' + b.name + '</div>';
                html += '<div class="bias-bar-bg"><div class="bias-bar" style="width:' + p + '%;background:' + c + '"></div></div></div>';
            });
            html += '<div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;">仓位乘数: <strong style="color:' + scoreColor + '">×' + fmtNum(rat.positionAdjustment.kellyMultiplier, 2) + '</strong>' + (rat.positionAdjustment.forceDefensiveMode ? ' · 🛡 防御模式' : '') + '</div>';
            html += '</div></div></div>';
        } else {
            html += '<div class="card"><div class="card-title"><span class="dot" style="background:#ec4899"></span>🃏 Step 7 · 人性压力测试</div><div class="placeholder" style="padding:20px;font-size:11px;">等待执行...</div></div>';
        }

        if (exec) {
            const isHalted = exec.riskStatus.halted || exec.kelly.enforcedPosition === 0;
            const sig = exec.signal.direction;
            const sigClass = sig === 'BUY' ? 'buy' : (sig === 'SELL' ? 'sell' : 'hold');
            const sigText = sig === 'BUY' ? '📈 买入' : (sig === 'SELL' ? '🔴 卖出' : '⏸ 持有');
            html += '<div class="card card-wide"><div class="card-title"><span class="dot" style="background:' + (isHalted ? '#ef4444' : '#22c55e') + '"></span>🛡️ Step 8 · 最终执行指令（熔断门控后）</div>';
            html += '<div class="execution-panel' + (isHalted ? ' halted' : '') + '">';
            html += '<div class="exec-header"><div class="exec-signal ' + sigClass + '">' + sigText + '</div>';
            html += '<div class="exec-pos"><div class="exec-pos-label">实际仓位（熔断后）</div>';
            html += '<div class="exec-pos-val' + (isHalted ? ' halted' : '') + '">' + fmtPct(exec.kelly.enforcedPosition) + '</div></div></div>';
            html += '<div class="exec-meta">';
            html += '<div class="exec-meta-item"><div class="exec-meta-label">原始凯利</div><div class="exec-meta-val" style="color:rgba(255,255,255,0.4);text-decoration:line-through;">' + fmtPct(exec.kelly.rawKelly) + '</div></div>';
            html += '<div class="exec-meta-item"><div class="exec-meta-label">止损</div><div class="exec-meta-val">' + fmtNum(exec.priceLevels.stopLoss, 2) + '</div></div>';
            html += '<div class="exec-meta-item"><div class="exec-meta-label">目标价</div><div class="exec-meta-val good">' + fmtNum(exec.priceLevels.targetPrice, 2) + '</div></div>';
            html += '<div class="exec-meta-item"><div class="exec-meta-label">盈亏比</div><div class="exec-meta-val good">' + fmtNum(exec.priceLevels.riskRewardRatio, 2) + ':1</div></div>';
            html += '</div>';

            if (exec.riskStatus.warnings && exec.riskStatus.warnings.length > 0) {
                html += '<div class="warnings-box">';
                exec.riskStatus.warnings.forEach(function(w) {
                    const isDanger = w.indexOf('🔴') >= 0 || w.indexOf('熔断') >= 0;
                    html += '<div class="warning-item' + (isDanger ? ' danger' : '') + '">' + w + '</div>';
                });
                html += '</div>';
            }

            if (exec.hedgingPlan.instruments && exec.hedgingPlan.instruments.length > 0) {
                html += '<div style="margin-top:10px;"><div style="font-size:10px;color:rgba(255,255,255,0.4;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">对冲工具</div>';
                html += '<div class="hedge-list">';
                exec.hedgingPlan.instruments.forEach(function(h) {
                    html += '<div class="hedge-chip">' + h.name + ' ' + fmtPct(h.hedgeRatio, 0) + '</div>';
                });
                html += '</div></div>';
            }

            html += '<div class="audit-trail">审计链：';
            (exec.auditTrail ? exec.auditTrail.stepsCompleted : []).forEach(function(s) {
                html += '<span class="audit-step">Step ' + s + '</span>';
            });
            html += '</div>';
            html += '</div></div>';
        } else {
            html += '<div class="card card-wide"><div class="card-title"><span class="dot" style="background:#22c55e"></span>🛡️ Step 8 · 最终执行指令</div><div class="placeholder" style="padding:20px;font-size:11px;">等待执行...</div></div>';
        }

        area.innerHTML = html;

        if (sim && sim.baselineKLine && sim.baselineKLine.length > 0) {
            setTimeout(function() { drawKline(sim.baselineKLine); }, 50);
        }
    }

    function clamp01(v) { return Math.max(0, Math.min(1, v)); }

    function stateLabel(s) {
        return {
            'PREFRONTAL_RATIONAL': '🧠 极度理性 · 前额叶主导',
            'BALANCED': '⚖️ 平衡状态',
            'LIMBIC_TILT': '😤 情绪上头 · 边缘系统激活',
            'EXTREME_TILT': '🔥 极度TILT · 强制防御'
        }[s] || s;
    }

    async function runFullPipeline() {
        if (pipelineRunning) return;
        pipelineRunning = true;
        $('runBtn').disabled = true;
        results = {};
        initPipelineGrid();
        setHealth('running', '引擎运行中...');

        const selectedTicker = $('assetSelect').value;
        const config = {
            initialTicker: selectedTicker || null,
            simulationDays: 60,
            monteCarloRuns: 40,
            pokerHands: 8,
            useHalfKelly: true,
            riskPreference: 'MODERATE',
            forceRegime: currentRegime
        };

        try {
            const stepOrder = [0, 1, 2, 3, 4, 5, 6, 7, 8];
            let input = null;
            const pipeline = {
                macroFunnel: null, factorLibrary: null, valuationV2: null,
                simulationResult: null, rationalityScore: null, executionOrder: null
            };
            const ctx = {
                config: config, regime: currentRegime, pipeline: pipeline
            };

            for (let i = 0; i < stepOrder.length; i++) {
                const sid = stepOrder[i];
                setStepStatus(sid, 'active');
                await new Promise(function(r) { setTimeout(r, 150 + Math.random() * 200); });
                const moduleFn = YMineQuantEngine.modules[sid];
                const result = moduleFn(input, ctx);
                const channelMap = { 0:'macroFunnel', 1:'factorLibrary', 2:'factorLibrary', 3:'valuationV2', 4:'valuationV2', 5:'simulationResult', 6:'simulationResult', 7:'rationalityScore', 8:'executionOrder' };
                const ch = channelMap[sid];
                pipeline[ch] = result;
                results[ch] = result;
                YBus.publish(ch, result);
                input = result;
                setStepStatus(sid, 'completed');
                renderContent();
                if (result && result.riskStatus && result.riskStatus.halted) {
                    setHealth('halted', '🚨 熔断触发');
                    for (let j = sid + 1; j < stepOrder.length; j++) setStepStatus(stepOrder[j], 'halted');
                    break;
                }
            }

            const finalHalted = results.executionOrder && results.executionOrder.riskStatus.halted;
            setHealth(finalHalted ? 'halted' : 'ok', finalHalted ? '🚨 熔断已触发' : '✅ 闭环完成');
            renderContent();
        } catch (e) {
            console.error(e);
            setHealth('halted', '❌ 引擎异常: ' + e.message);
        } finally {
            pipelineRunning = false;
            $('runBtn').disabled = false;
        }
    }

    function init() {
        initPipelineGrid();
        initAssetSelect();
        switchRegimeUI('RED_OCEAN');
        setHealth('ok', '系统就绪');
        renderContent();

        window.addEventListener('resize', function() {
            if (results.simulationResult && results.simulationResult.baselineKLine) {
                drawKline(results.simulationResult.baselineKLine);
            }
        });

        YBus.subscribe('riskFuse', function(data) {
            if (data && data.status === 'halted') {
                setHealth('halted', '🚨 风控熔断');
                STEPS.forEach(function(s) { if (s.id >= 5) setStepStatus(s.id, 'halted'); });
            }
        });
    }

    window.switchRegimeUI = switchRegimeUI;
    window.runFullPipeline = runFullPipeline;
    window.emergencyHaltUI = emergencyHaltUI;

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
